<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost a curb — CURB</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
<link rel="icon" sizes="any" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/site.css">
<script src="/site.js" defer></script>
<style>
  :root{--paper:#F2ECDF;--ink:#17150F;--soft:#4A4536;--red:#C1121F}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%;overflow-x:clip;-webkit-overflow-scrolling:touch}
  body{background:var(--paper);color:var(--ink);font-family:'Hanken Grotesk',sans-serif;min-height:100dvh;display:flex;flex-direction:column}
  .splash{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:32px;text-align:center}
  .cube{height:107px;width:auto;display:block}
  h1{font-family:'Anton',sans-serif;font-size:clamp(40px,9vw,72px);text-transform:uppercase;line-height:.95}
  h1 .d{color:var(--red)}
  p{font-weight:600;color:var(--soft);max-width:30em;font-size:17px}
  .btn{display:inline-flex;align-items:center;gap:9px;font-weight:800;font-size:16px;text-decoration:none;
    border:2.5px solid var(--ink);border-radius:13px;padding:14px 22px;background:var(--ink);color:var(--paper);
    box-shadow:5px 5px 0 var(--ink);margin-top:6px}
  .btn svg{display:block;width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.8;stroke-linecap:round;stroke-linejoin:round}
  .btn:active{transform:translate(2px,2px);box-shadow:none}
  /* shared site footer (same across all internal pages) */
  .wrap{max-width:1080px;margin:0 auto;padding:0 clamp(20px,4.5vw,48px)}
  footer{border-top:3px solid var(--ink);background:var(--ink);color:var(--paper)}
  .foot{display:flex;flex-wrap:wrap;gap:18px 36px;align-items:center;padding-top:30px;padding-bottom:34px;font-weight:700;font-size:14.5px}
  .foot .fine{flex-basis:100%;font-weight:600;font-size:13px;color:rgba(242,236,223,.66);line-height:1.6}
  .foot a{color:var(--paper);text-underline-offset:3px}
  .foot .mark{font-family:'Anton',sans-serif;font-size:19px;letter-spacing:.02em}
  .foot .mark span{color:var(--red)}

<script>

</style></head><body>
  <main class="splash">
    <img class="cube" src="/icons/logo.svg" alt="" aria-hidden="true">
